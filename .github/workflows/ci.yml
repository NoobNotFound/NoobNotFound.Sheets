name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─────────────────────────────────────────────
  # Job 1 – Build (runs on every push / PR)
  # ─────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x   # ← change to match your TFM if needed

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Uncomment if you add tests later:
      # - name: Test
      #   run: dotnet test --no-build --configuration Release

  # ─────────────────────────────────────────────
  # Job 2 – Pack & Publish (only on [publish])
  # ─────────────────────────────────────────────
  publish:
    name: Pack & Publish to NuGet
    runs-on: ubuntu-latest
    needs: build                    # only runs after a clean build

    # Gate: commit message OR description must contain [publish]
    # github.event.head_commit.message contains both subject + body
    if: |
      github.event_name == 'push' &&
      contains(github.event.head_commit.message, '[publish]')

    permissions:
      id-token: write               # required for NuGet Trusted Publishing (OIDC)
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Pack
        run: dotnet pack --no-restore --configuration Release --output ./nupkg

      # Exchange GitHub OIDC token for a short-lived NuGet API key.
      # No stored secrets needed — configure a Trusted Publishing policy
      # on nuget.org first (see README for instructions).
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          # Store your nuget.org profile name (NOT your email) as a secret.
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "./nupkg/*.nupkg" \
            --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
