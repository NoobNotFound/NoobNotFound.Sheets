name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  PROJECT: NoobNotFound.Sheets/NoobNotFound.Sheets.csproj

jobs:
  # ─────────────────────────────────────────────
  # Job 1 – Build (runs on every push / PR)
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x   # ← change to match your <TargetFramework> if needed

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }}

      - name: Build
        run: dotnet build ${{ env.PROJECT }} --no-restore --configuration Release

  # ─────────────────────────────────────────────
  # Job 2 – Pack & Publish (only on [publish])
  # ─────────────────────────────────────────────
  publish:
    name: Pack & Publish to NuGet
    runs-on: ubuntu-latest
    needs: build

    if: |
      github.event_name == 'push' &&
      contains(github.event.head_commit.message, '[publish]')

    permissions:
      id-token: write   # required for NuGet Trusted Publishing (OIDC)
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }}

      - name: Pack
        run: dotnet pack ${{ env.PROJECT }} --no-restore --configuration Release --output ./nupkg

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "./nupkg/*.nupkg" \
            --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate